name: release

# Build binaries for every platform and attach them to a GitHub Release
# whenever a v* tag is pushed (or run manually).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: hitair-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: hitair-linux-aarch64
          - os: macos-14
            target: aarch64-apple-darwin
            name: hitair-macos-arm64
          # Cross-compile the Intel binary on the Apple-Silicon runner — the
          # macos-13 (Intel) hosted runners queue badly. The macOS SDK is
          # universal, so this builds a valid x86_64 binary.
          - os: macos-14
            target: x86_64-apple-darwin
            name: hitair-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: hitair-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux — ALSA + egui/eframe)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config libxkbcommon-dev libwayland-dev libgl1-mesa-dev

      # aws-lc-rs (via rustls) assembles on Windows with NASM.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build the desktop app
        run: cargo build --release -p hitair-gui --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="target/${{ matrix.target }}/release"
          name="${{ matrix.name }}"
          version="${GITHUB_REF_NAME#v}"
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Ship a real .app bundle (Dock icon, no Terminal), not a bare binary.
            sh scripts/make-macos-app.sh "$dir/hitair-gui" hitair-gui.app "$version"
            tar -czf "hitair-gui-${name#hitair-}.tar.gz" hitair-gui.app
          else
            tar -C "$dir" -czf "hitair-gui-${name#hitair-}.tar.gz" hitair-gui
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "target/${{ matrix.target }}/release"
          $name = "${{ matrix.name }}"
          $gui = "hitair-gui-" + $name.Substring("hitair-".Length)
          Compress-Archive -Path "$dir/hitair-gui.exe" -DestinationPath "$gui.zip" -Force

      - name: Release notes from CHANGELOG
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          sh scripts/changelog-section.sh "$version" > release-notes.md || true
          if [ ! -s release-notes.md ]; then
            printf 'Release %s\n' "$GITHUB_REF_NAME" > release-notes.md
          fi
          cat release-notes.md

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            *.tar.gz
            *.zip

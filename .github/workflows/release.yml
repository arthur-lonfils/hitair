name: release

# Build binaries for every platform and attach them to a GitHub Release
# whenever a v* tag is pushed (or run manually).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: hitair-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: hitair-linux-aarch64
          - os: macos-14
            target: aarch64-apple-darwin
            name: hitair-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            name: hitair-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: hitair-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ALSA (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      # aws-lc-rs (via rustls) assembles on Windows with NASM.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: tar -C "target/${{ matrix.target }}/release" -czf "${{ matrix.name }}.tar.gz" hitair

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/hitair.exe" -DestinationPath "${{ matrix.name }}.zip" -Force

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
